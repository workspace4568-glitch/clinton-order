services:
  - type: web
    name: nexarion-zone
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    disk:
      name: nexarion-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: nexarion2024
      - key: DATABASE_URL
        value: sqlite:////data/nexarion.db
      - key: RENDER
        value: "true"
      - key: FLASK_DEBUG
        value: "0"
