services:
  - type: web
    name: nexarion-zone
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: nexarion2024
      - key: DATABASE_URL
        fromDatabase:
          name: nexarion-db
          property: connectionString
      - key: RENDER
        value: "true"

  - type: postgres
    name: nexarion-db
    plan: free
